# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "Oleg Belyaev"                      
  image: img/DSC_0566 - copia.jpg
  
  favicon: img/svg_antarctica.svg
  
  # start of the navigation bar at the top of the website
  # Items live under `left:` and are centered via CSS (.navbar-nav) in
  # html/styles.scss; the logo stays pinned left and search pinned right.
  navbar:
    pinned: true
    logo: /img/svg_antarctica.svg

    left:
# your sub-pages
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about/index.qmd
      - text: "Research"
        href: publications/index.qmd
      - text: "Fieldwork"
        href: fieldwork/index.qmd
      - text: "Education & Experience"
        href: education-experience/index.qmd
      - text: "Blog"
        href: blog/index.qmd
      - text: "Contact"
        href: contact/index.qmd
  
  

# Don't touch unless you know what you are doing :) ------------
  search: false
  page-footer:
    left: |
      <span class="faux-block"><a href="/0x90A60D6A-pub.asc" target="_blank" style="color: #D1E8E2; text-decoration: none;"><i class="fas fa-key" style="color:#FFCB9A;"></i> PGP public key</a></span>
      <span class="faux-block"><a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" style="color: #D1E8E2; text-decoration: none;"><i class="fab fa-creative-commons"></i> <i class="fab fa-creative-commons-by"></i> <i class="fab fa-creative-commons-nc"></i> <i class="fab fa-creative-commons-sa"></i> CC BY-NC-SA 4.0</a></span>
    right: |
      <span class="faux-block" style="color: #D1E8E2;">&#169; 2025 Oleg Belyaev - Made with <a href="https://quarto.org/" target="_blank" style="color: #FFCB9A; text-decoration: underline;">Quarto</a></span>

project:
  type: website
  output-dir: docs
  resources:
    - 0x90A60D6A-pub.asc

  preview:
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    include-in-header: header.html